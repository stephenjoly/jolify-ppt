<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jolify Tools</title>
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f1;
        --surface: #ffffff;
        --surface-soft: #f5f5f5;
        --border: #dddddd;
        --border-strong: #c9c9c9;
        --text: #262626;
        --muted: #666666;
        --accent: #2a74d7;
        --danger: #b53a31;
        --shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        --radius: 10px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Aptos, "Segoe UI", sans-serif;
      }

      body {
        padding: 0;
      }

      .shell {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 14px 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }

      .topbar h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
      }

      .topbar-copy {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 11px;
      }

      .tools {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
        padding-bottom: 88px;
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: visible;
      }

      .section-header {
        padding: 8px 12px;
        background: var(--surface-soft);
        border-bottom: 1px solid #ececec;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      .section-body {
        padding: 10px 10px 12px;
      }

      .subsection + .subsection {
        margin-top: 10px;
      }

      .subsection-label {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
        gap: 8px;
      }

      .tool-button {
        position: relative;
        width: 42px;
        height: 42px;
        padding: 0;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
      }

      .tool-button:hover:not(:disabled),
      .tool-button:focus-visible:not(:disabled) {
        background: #f8f8f8;
        border-color: var(--border-strong);
        box-shadow: var(--shadow);
        transform: translateY(-1px);
        outline: none;
      }

      .tool-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .tool-button img {
        width: 24px;
        height: 24px;
        display: block;
      }

      .tool-glyph {
        width: 24px;
        height: 24px;
        border-radius: 8px;
        border: 1px solid #cfcfcf;
        background: #f4f4f4;
        color: #4f4f4f;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .tool-glyph.compact {
        font-size: 9px;
      }

      .tool-glyph.danger {
        border-color: #dfb3ae;
        background: #f9ecea;
        color: var(--danger);
      }

      .tooltip {
        position: absolute;
        left: 50%;
        top: calc(100% + 8px);
        z-index: 20;
        width: 190px;
        padding: 8px 9px;
        border-radius: 9px;
        background: #1f1f1f;
        color: #ffffff;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(-3px);
        transition: opacity 0.12s ease, transform 0.12s ease;
      }

      .tooltip::before {
        content: "";
        position: absolute;
        left: 50%;
        top: -5px;
        width: 10px;
        height: 10px;
        background: #1f1f1f;
        transform: translateX(-50%) rotate(45deg);
      }

      .tool-button:hover .tooltip,
      .tool-button:focus-visible .tooltip {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .tooltip-title {
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.2;
      }

      .tooltip-copy {
        display: block;
        color: rgba(255, 255, 255, 0.84);
        font-size: 10px;
        line-height: 1.35;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .status-card {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid var(--border);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(8px);
      }

      .status-label {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #status {
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
      }

      #status strong {
        display: block;
        margin-bottom: 4px;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #status.success { color: #156337; }
      #status.warning { color: #8b5400; }
      #status.error { color: var(--danger); }
      #status.info { color: var(--text); }
    </style>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body class="ms-Fabric">
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Tools</h1>
          <p class="topbar-copy">Hover or focus an icon for details.</p>
        </div>
      </header>

      <main class="tools">
        <section class="section">
          <div class="section-header">Clipboard</div>
          <div class="section-body">
            <div class="icon-grid">
              <button id="copy-all-btn" type="button" class="tool-button" aria-label="Copy position and size">
                <img src="../../assets/icons/copyPositionAndSize_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Copy position and size</span><span class="tooltip-copy">Save both coordinates and dimensions from the first selected shape.</span></span>
              </button>
              <button id="paste-all-btn" type="button" class="tool-button" aria-label="Paste position and size">
                <img src="../../assets/icons/pastePositionAndSize_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Paste position and size</span><span class="tooltip-copy">Apply the saved geometry to every selected target shape.</span></span>
              </button>
              <button id="copy-position-btn" type="button" class="tool-button" aria-label="Copy position">
                <img src="../../assets/icons/copyPositionOnly_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Copy position</span><span class="tooltip-copy">Save only the left and top coordinates from the first selected shape.</span></span>
              </button>
              <button id="paste-position-btn" type="button" class="tool-button" aria-label="Paste position">
                <img src="../../assets/icons/pastePositionOnly_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Paste position</span><span class="tooltip-copy">Move the current selection to the saved coordinates.</span></span>
              </button>
              <button id="copy-size-btn" type="button" class="tool-button" aria-label="Copy size">
                <img src="../../assets/icons/copySizeOnly_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Copy size</span><span class="tooltip-copy">Save only width and height from the first selected shape.</span></span>
              </button>
              <button id="paste-size-btn" type="button" class="tool-button" aria-label="Paste size">
                <img src="../../assets/icons/pasteSizeOnly_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Paste size</span><span class="tooltip-copy">Apply the saved width and height to every selected target.</span></span>
              </button>
              <button id="swap-btn" type="button" class="tool-button" aria-label="Swap positions">
                <img src="../../assets/icons/swapPositions_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Swap positions</span><span class="tooltip-copy">Exchange the positions of exactly two selected shapes.</span></span>
              </button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">Resize</div>
          <div class="section-body">
            <div class="subsection">
              <p class="subsection-label">Match Size</p>
              <div class="icon-grid">
                <button id="match-size-btn" type="button" class="tool-button" aria-label="Match height and width">
                  <img src="../../assets/icons/matchHeightAndWidth_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Match height and width</span><span class="tooltip-copy">Copy both dimensions from the first selected shape onto the rest.</span></span>
                </button>
                <button id="match-width-btn" type="button" class="tool-button" aria-label="Match width">
                  <img src="../../assets/icons/matchWidth_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Match width</span><span class="tooltip-copy">Only change widths. Heights stay as they are.</span></span>
                </button>
                <button id="match-height-btn" type="button" class="tool-button" aria-label="Match height">
                  <img src="../../assets/icons/matchHeight_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Match height</span><span class="tooltip-copy">Only change heights. Widths stay as they are.</span></span>
                </button>
              </div>
            </div>

            <div class="subsection">
              <p class="subsection-label">Match Edges</p>
              <div class="icon-grid">
                <button id="stretch-left-btn" type="button" class="tool-button" aria-label="Match left edge">
                  <span class="tool-glyph">L</span>
                  <span class="tooltip"><span class="tooltip-title">Match left edge</span><span class="tooltip-copy">Stretch the left edge to the reference left edge.</span></span>
                </button>
                <button id="stretch-right-btn" type="button" class="tool-button" aria-label="Match right edge">
                  <span class="tool-glyph">R</span>
                  <span class="tooltip"><span class="tooltip-title">Match right edge</span><span class="tooltip-copy">Stretch the right edge to the reference right edge.</span></span>
                </button>
                <button id="stretch-top-btn" type="button" class="tool-button" aria-label="Match top edge">
                  <span class="tool-glyph">T</span>
                  <span class="tooltip"><span class="tooltip-title">Match top edge</span><span class="tooltip-copy">Stretch the top edge to the reference top edge.</span></span>
                </button>
                <button id="stretch-bottom-btn" type="button" class="tool-button" aria-label="Match bottom edge">
                  <span class="tool-glyph">B</span>
                  <span class="tooltip"><span class="tooltip-title">Match bottom edge</span><span class="tooltip-copy">Stretch the bottom edge to the reference bottom edge.</span></span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">Align</div>
          <div class="section-body">
            <div class="subsection">
              <p class="subsection-label">Horizontal</p>
              <div class="icon-grid">
                <button id="align-left-btn" type="button" class="tool-button" aria-label="Align left">
                  <img src="../../assets/icons/alignLeft_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Align left</span><span class="tooltip-copy">Snap selected shapes to the leftmost edge in the selection.</span></span>
                </button>
                <button id="align-center-btn" type="button" class="tool-button" aria-label="Align center">
                  <img src="../../assets/icons/alignCenterH_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Align center</span><span class="tooltip-copy">Center selected shapes on the same vertical center line.</span></span>
                </button>
                <button id="align-right-btn" type="button" class="tool-button" aria-label="Align right">
                  <img src="../../assets/icons/alignRight_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Align right</span><span class="tooltip-copy">Snap selected shapes to the rightmost edge in the selection.</span></span>
                </button>
                <button id="distribute-h-btn" type="button" class="tool-button" aria-label="Distribute horizontally">
                  <img src="../../assets/icons/distributeH_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Distribute horizontally</span><span class="tooltip-copy">Even out spacing from left to right across the selection.</span></span>
                </button>
              </div>
            </div>

            <div class="subsection">
              <p class="subsection-label">Vertical</p>
              <div class="icon-grid">
                <button id="align-top-btn" type="button" class="tool-button" aria-label="Align top">
                  <img src="../../assets/icons/alignTop_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Align top</span><span class="tooltip-copy">Snap selected shapes to the highest top edge in the selection.</span></span>
                </button>
                <button id="align-middle-btn" type="button" class="tool-button" aria-label="Align middle">
                  <img src="../../assets/icons/alignMiddleV_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Align middle</span><span class="tooltip-copy">Center selected shapes on the same horizontal midline.</span></span>
                </button>
                <button id="align-bottom-btn" type="button" class="tool-button" aria-label="Align bottom">
                  <img src="../../assets/icons/alignBottom_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Align bottom</span><span class="tooltip-copy">Snap selected shapes to the lowest bottom edge in the selection.</span></span>
                </button>
                <button id="distribute-v-btn" type="button" class="tool-button" aria-label="Distribute vertically">
                  <img src="../../assets/icons/distributeV_32.png" alt="" />
                  <span class="tooltip"><span class="tooltip-title">Distribute vertically</span><span class="tooltip-copy">Even out spacing from top to bottom across the selection.</span></span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">Arrange + Group</div>
          <div class="section-body">
            <div class="icon-grid">
              <button id="align-center-group-btn" type="button" class="tool-button" aria-label="Center and group">
                <img src="../../assets/icons/alignCenterHAndGroup_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Center and group</span><span class="tooltip-copy">Align selected shapes to the same center, then group them.</span></span>
              </button>
              <button id="align-middle-group-btn" type="button" class="tool-button" aria-label="Middle and group">
                <img src="../../assets/icons/alignMiddleVAndGroup_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Middle and group</span><span class="tooltip-copy">Align selected shapes to the same middle line, then group them.</span></span>
              </button>
              <button id="center-middle-group-btn" type="button" class="tool-button" aria-label="Center, middle, and group">
                <img src="../../assets/icons/centerMiddleAndGroup_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Center, middle, and group</span><span class="tooltip-copy">Do both center alignments first, then create one group.</span></span>
              </button>
              <button id="distribute-h-group-btn" type="button" class="tool-button" aria-label="Distribute horizontally and group">
                <img src="../../assets/icons/distributeHAndGroup_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Distribute horizontally and group</span><span class="tooltip-copy">Even out left-to-right spacing, then group the result.</span></span>
              </button>
              <button id="distribute-v-group-btn" type="button" class="tool-button" aria-label="Distribute vertically and group">
                <img src="../../assets/icons/distributeVAndGroup_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Distribute vertically and group</span><span class="tooltip-copy">Even out top-to-bottom spacing, then group the result.</span></span>
              </button>
              <button id="distribute-hv-group-btn" type="button" class="tool-button" aria-label="Distribute both ways and group">
                <span class="tool-glyph compact">HV</span>
                <span class="tooltip"><span class="tooltip-title">Distribute both ways and group</span><span class="tooltip-copy">Use the taskpane version of the combined horizontal and vertical distribute workflow.</span></span>
              </button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">Text + Insert</div>
          <div class="section-body">
            <div class="icon-grid">
              <button id="merge-textboxes-btn" type="button" class="tool-button" aria-label="Merge text boxes">
                <img src="../../assets/icons/mergeTextBoxes_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Merge text boxes</span><span class="tooltip-copy">Combine text from selected text boxes into a single box.</span></span>
              </button>
              <button id="split-textbox-btn" type="button" class="tool-button" aria-label="Split text box by lines">
                <img src="../../assets/icons/splitTextBoxByLines_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Split text box by lines</span><span class="tooltip-copy">Turn each line in a text box into its own new text box.</span></span>
              </button>
              <button id="remove-text-margins-btn" type="button" class="tool-button" aria-label="Remove text margins">
                <img src="../../assets/icons/removeTextMargins_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Remove text margins</span><span class="tooltip-copy">Set text margins to zero on the selected text boxes.</span></span>
              </button>
              <button id="disable-text-autofit-btn" type="button" class="tool-button" aria-label="AutoFit off">
                <img src="../../assets/icons/disableTextAutofit_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">AutoFit off</span><span class="tooltip-copy">Disable PowerPoint auto-fitting so text stops resizing itself.</span></span>
              </button>
              <button id="create-center-sticker-btn" type="button" class="tool-button" aria-label="Create center sticker">
                <img src="../../assets/icons/createCenterSticker_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Create center sticker</span><span class="tooltip-copy">Drop in a centered placeholder sticker at Jolify’s default size.</span></span>
              </button>
              <button id="create-grid-btn" type="button" class="tool-button" aria-label="Create grid">
                <img src="../../assets/icons/openGridDialog_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Create grid</span><span class="tooltip-copy">Open the grid builder for structured multi-shape layouts.</span></span>
              </button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">Style Clipboard</div>
          <div class="section-body">
            <div class="icon-grid">
              <button id="copy-fill-btn" type="button" class="tool-button" aria-label="Copy fill">
                <span class="tool-glyph compact">CF</span>
                <span class="tooltip"><span class="tooltip-title">Copy fill</span><span class="tooltip-copy">Save the fill from the first selected shape into Jolify’s clipboard.</span></span>
              </button>
              <button id="paste-fill-btn" type="button" class="tool-button" aria-label="Paste fill">
                <span class="tool-glyph compact">PF</span>
                <span class="tooltip"><span class="tooltip-title">Paste fill</span><span class="tooltip-copy">Apply the saved fill to the selected target shape or shapes.</span></span>
              </button>
              <button id="copy-outline-btn" type="button" class="tool-button" aria-label="Copy outline">
                <span class="tool-glyph compact">CO</span>
                <span class="tooltip"><span class="tooltip-title">Copy outline</span><span class="tooltip-copy">Save outline settings from the first selected shape.</span></span>
              </button>
              <button id="paste-outline-btn" type="button" class="tool-button" aria-label="Paste outline">
                <span class="tool-glyph compact">PO</span>
                <span class="tooltip"><span class="tooltip-title">Paste outline</span><span class="tooltip-copy">Apply the saved outline to the current selection.</span></span>
              </button>
              <button id="copy-style-btn" type="button" class="tool-button" aria-label="Copy style">
                <span class="tool-glyph compact">CS</span>
                <span class="tooltip"><span class="tooltip-title">Copy style</span><span class="tooltip-copy">Save fill, outline, and text styling from the first selected shape.</span></span>
              </button>
              <button id="paste-style-btn" type="button" class="tool-button" aria-label="Paste style">
                <span class="tool-glyph compact">PS</span>
                <span class="tooltip"><span class="tooltip-title">Paste style</span><span class="tooltip-copy">Apply the saved combined style to the selected target shapes.</span></span>
              </button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">Match Style</div>
          <div class="section-body">
            <div class="icon-grid">
              <button id="match-fill-btn" type="button" class="tool-button" aria-label="Match fill">
                <img src="../../assets/icons/matchFillStyle_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Match fill</span><span class="tooltip-copy">Copy fill from the first selected shape directly onto the rest.</span></span>
              </button>
              <button id="match-outline-btn" type="button" class="tool-button" aria-label="Match outline">
                <img src="../../assets/icons/matchOutlineStyle_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Match outline</span><span class="tooltip-copy">Copy outline from the first selected shape directly onto the rest.</span></span>
              </button>
              <button id="match-style-btn" type="button" class="tool-button" aria-label="Match style">
                <img src="../../assets/icons/matchShapeStyle_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Match style</span><span class="tooltip-copy">Apply the first selected shape’s fill, outline, and text styling to the others.</span></span>
              </button>
              <button id="clear-fill-btn" type="button" class="tool-button" aria-label="No fill">
                <img src="../../assets/icons/clearFill_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">No fill</span><span class="tooltip-copy">Remove fill from the selected shapes.</span></span>
              </button>
              <button id="clear-outline-btn" type="button" class="tool-button" aria-label="No outline">
                <img src="../../assets/icons/clearOutline_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">No outline</span><span class="tooltip-copy">Remove outlines from the selected shapes.</span></span>
              </button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">Deck Tools</div>
          <div class="section-body">
            <div class="icon-grid">
              <button id="save-selected-deck-btn" type="button" class="tool-button" aria-label="Save selected deck">
                <span class="tool-glyph compact">SD</span>
                <span class="tooltip"><span class="tooltip-title">Save selected deck</span><span class="tooltip-copy">Export the selected slides into a new presentation.</span></span>
              </button>
              <button id="move-to-unused-btn" type="button" class="tool-button" aria-label="Move to unused">
                <img src="../../assets/icons/moveToUnusedSection_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Move to unused</span><span class="tooltip-copy">Move the selected slides into the deck’s unused section.</span></span>
              </button>
              <button id="weekday-range-btn" type="button" class="tool-button" aria-label="Weekday range">
                <img src="../../assets/icons/openWeekdayRangeDialog_32.png" alt="" />
                <span class="tooltip"><span class="tooltip-title">Weekday range</span><span class="tooltip-copy">Generate a clean list of Mondays, Tuesdays, or any weekday across a date range.</span></span>
              </button>
              <button id="toggle-draft-btn" type="button" class="tool-button" aria-label="Toggle draft sticker">
                <span class="tool-glyph compact danger">DR</span>
                <span class="tooltip"><span class="tooltip-title">Toggle draft sticker</span><span class="tooltip-copy">Add or remove Jolify’s draft marker across the presentation.</span></span>
              </button>
            </div>
          </div>
        </section>
      </main>

      <div class="status-card">
        <p class="status-label">Status</p>
        <div id="status" role="status" aria-live="polite"></div>
      </div>
    </div>
  </body>
</html>
