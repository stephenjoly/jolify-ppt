<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Clean-up Deck</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 20px;
        background: #f3f2f1;
        color: #201f1e;
      }

      .dialog-shell {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      h1 {
        font-size: 18px;
        line-height: 1.3;
        margin: 0;
      }

      .intro {
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
        color: #323130;
      }

      .options {
        background: #ffffff;
        border: 1px solid #e1dfdd;
        border-radius: 6px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 13px;
        line-height: 1.4;
        color: #323130;
      }

      input[type="checkbox"] {
        margin-top: 2px;
      }

      .status {
        background: #ffffff;
        border: 1px solid #e1dfdd;
        border-left: 4px solid #0078d4;
        border-radius: 6px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .status strong {
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .status span {
        font-size: 13px;
        line-height: 1.4;
      }

      .status.success { border-left-color: #107c10; }
      .status.warning { border-left-color: #d83b01; }
      .status.error { border-left-color: #a4262c; }

      .actions {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px 12px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        background: #0078d4;
        color: #fff;
      }

      button.secondary {
        background: #fff;
        color: #323130;
        border: 1px solid #c8c6c4;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main class="dialog-shell">
      <h1>Clean-up Deck</h1>
      <p class="intro">
        Create a cleaned copy for sharing. The current deck stays untouched.
      </p>

      <div class="options">
        <label>
          <input id="remove-comments" type="checkbox" checked />
          <span>Remove slide comments from the cleaned copy.</span>
        </label>
        <label>
          <input id="remove-notes" type="checkbox" checked />
          <span>Remove speaker notes from the cleaned copy.</span>
        </label>
      </div>

      <div id="status" class="status info">
        <strong>Ready</strong>
        <span>Choose what to remove, then create a cleaned copy.</span>
      </div>

      <div class="actions">
        <button id="run" type="button" class="primary">Create Clean Copy</button>
        <button id="close" type="button" class="secondary">Close</button>
      </div>
    </main>
  </body>
</html>
