<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Insert Symbol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        background: #f3f2f1;
        color: #201f1e;
        box-sizing: border-box;
      }

      .dialog-shell {
        display: flex;
        flex-direction: column;
        gap: 14px;
        max-width: 620px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.3;
      }

      .intro {
        margin: 0;
        color: #484644;
        font-size: 13px;
        line-height: 1.45;
      }

      .search {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c8c6c4;
        border-radius: 4px;
        padding: 10px 12px;
        font: inherit;
        background: #fff;
      }

      .status {
        background: #ffffff;
        border: 1px solid #e1dfdd;
        border-left: 4px solid #0078d4;
        border-radius: 6px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .status strong {
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .status span {
        font-size: 13px;
        line-height: 1.35;
      }

      .symbol-sections {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .symbol-section {
        background: #fff;
        border: 1px solid #e1dfdd;
        border-radius: 8px;
        padding: 10px;
      }

      .symbol-section h2 {
        margin: 0 0 8px;
        color: #605e5c;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .symbol-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
        gap: 8px;
      }

      .symbol-button {
        min-height: 44px;
        border: 1px solid #d2d0ce;
        border-radius: 8px;
        background: #fff;
        color: #201f1e;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .symbol-button:hover,
      .symbol-button:focus-visible {
        background: #f5f9ff;
        border-color: #106ebe;
        outline: none;
      }

      .symbol-button.selected {
        background: #deecf9;
        border-color: #106ebe;
        box-shadow: inset 0 0 0 1px #106ebe;
      }

      .preview {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 12px;
        background: #fff;
        border: 1px solid #e1dfdd;
        border-radius: 8px;
      }

      .preview-symbol {
        min-height: 72px;
        border: 1px solid #d2d0ce;
        border-radius: 8px;
        background: #faf9f8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 38px;
      }

      .preview-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .preview-copy strong {
        font-size: 14px;
      }

      .preview-copy span {
        color: #605e5c;
        font-size: 12px;
        line-height: 1.4;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      button.action {
        flex: 1;
        padding: 10px 12px;
        border: none;
        border-radius: 4px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: #0078d4;
        color: #fff;
      }

      .secondary {
        background: #fff;
        color: #323130;
        border: 1px solid #c8c6c4;
      }
    </style>
  </head>
  <body>
    <main class="dialog-shell">
      <h1>Insert Symbol</h1>
      <p class="intro">Pick a symbol. If your cursor is inside text, Jolify inserts it there. Otherwise it creates a new centered text box with the chosen symbol.</p>

      <input id="search" class="search" type="search" placeholder="Filter symbols or names" />

      <div id="status" class="status">
        <strong>Ready</strong>
        <span>Choose a symbol and click Insert.</span>
      </div>

      <div class="preview">
        <div id="preview-symbol" class="preview-symbol">•</div>
        <div class="preview-copy">
          <strong id="preview-label">Bullet</strong>
          <span id="preview-code">Unicode U+2022</span>
          <span id="preview-help">Good for bullets, callouts, and simple list markers.</span>
        </div>
      </div>

      <div id="symbol-sections" class="symbol-sections"></div>

      <div class="actions">
        <button id="insert" type="button" class="action primary">Insert Symbol</button>
        <button id="close" type="button" class="action secondary">Close</button>
      </div>
    </main>

    <script>
      const SYMBOL_SECTIONS = [
        {
          title: "Bullets + Marks",
          symbols: [
            { char: "•", label: "Bullet", note: "Good for bullets, callouts, and simple list markers." },
            { char: "◦", label: "White bullet", note: "Lighter alternative for nested bullets." },
            { char: "▪", label: "Small square", note: "Compact square bullet or marker." },
            { char: "✓", label: "Check mark", note: "Simple positive completion mark." },
            { char: "✔", label: "Heavy check mark", note: "Bolder completion mark for emphasis." },
            { char: "✕", label: "Cross mark", note: "Simple rejection or no-go marker." },
            { char: "★", label: "Star", note: "Useful for emphasis or scoring visuals." },
            { char: "☆", label: "White star", note: "Open star for lighter emphasis." },
          ],
        },
        {
          title: "Arrows",
          symbols: [
            { char: "→", label: "Right arrow", note: "Basic directional arrow." },
            { char: "←", label: "Left arrow", note: "Basic directional arrow." },
            { char: "↑", label: "Up arrow", note: "Basic directional arrow." },
            { char: "↓", label: "Down arrow", note: "Basic directional arrow." },
            { char: "↗", label: "North east arrow", note: "Up-right directional arrow." },
            { char: "↘", label: "South east arrow", note: "Down-right directional arrow." },
            { char: "⇒", label: "Right double arrow", note: "Good for stronger transitions." },
            { char: "➜", label: "Heavy right arrow", note: "Decorative arrow for callouts." },
          ],
        },
        {
          title: "Shapes + Math",
          symbols: [
            { char: "▲", label: "Triangle", note: "Solid triangle glyph." },
            { char: "■", label: "Square", note: "Solid square glyph." },
            { char: "◆", label: "Diamond", note: "Solid diamond glyph." },
            { char: "●", label: "Black circle", note: "Solid circle glyph." },
            { char: "±", label: "Plus minus", note: "Math or variance indicator." },
            { char: "×", label: "Multiplication", note: "Math or close indicator." },
            { char: "÷", label: "Division", note: "Math indicator." },
            { char: "≈", label: "Approximately equal", note: "Approximation symbol." },
          ],
        },
        {
          title: "Currency + Legal",
          symbols: [
            { char: "$", label: "Dollar", note: "US dollar sign." },
            { char: "€", label: "Euro", note: "Euro sign." },
            { char: "£", label: "Pound", note: "British pound sign." },
            { char: "¥", label: "Yen", note: "Yen sign." },
            { char: "©", label: "Copyright", note: "Copyright symbol." },
            { char: "®", label: "Registered", note: "Registered trademark symbol." },
            { char: "™", label: "Trademark", note: "Trademark symbol." },
            { char: "§", label: "Section", note: "Legal section sign." },
          ],
        },
      ];

      let selectedSymbol = SYMBOL_SECTIONS[0].symbols[0];

      function toCodePointString(char) {
        return Array.from(char)
          .map((part) => `U+${part.codePointAt(0).toString(16).toUpperCase().padStart(4, "0")}`)
          .join(" ");
      }

      function updatePreview(symbol) {
        selectedSymbol = symbol;
        document.getElementById("preview-symbol").textContent = symbol.char;
        document.getElementById("preview-label").textContent = symbol.label;
        document.getElementById("preview-code").textContent = `Unicode ${toCodePointString(symbol.char)}`;
        document.getElementById("preview-help").textContent = symbol.note;
      }

      function renderSections(filter = "") {
        const container = document.getElementById("symbol-sections");
        const normalized = filter.trim().toLowerCase();
        container.innerHTML = "";

        SYMBOL_SECTIONS.forEach((section) => {
          const matches = section.symbols.filter((symbol) => {
            if (!normalized) {
              return true;
            }

            return (
              symbol.char.includes(normalized) ||
              symbol.label.toLowerCase().includes(normalized) ||
              symbol.note.toLowerCase().includes(normalized)
            );
          });

          if (matches.length === 0) {
            return;
          }

          const sectionEl = document.createElement("section");
          sectionEl.className = "symbol-section";

          const title = document.createElement("h2");
          title.textContent = section.title;
          sectionEl.appendChild(title);

          const grid = document.createElement("div");
          grid.className = "symbol-grid";

          matches.forEach((symbol) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "symbol-button";
            button.textContent = symbol.char;
            button.title = `${symbol.label}\n${symbol.note}\n${toCodePointString(symbol.char)}`;
            button.setAttribute("aria-label", symbol.label);

            if (selectedSymbol.char === symbol.char && selectedSymbol.label === symbol.label) {
              button.classList.add("selected");
            }

            button.addEventListener("click", () => {
              updatePreview(symbol);
              renderSections(document.getElementById("search").value);
            });

            button.addEventListener("dblclick", () => {
              Office.context.ui.messageParent(JSON.stringify({
                symbol: symbol.char,
                label: symbol.label,
              }));
            });

            grid.appendChild(button);
          });

          sectionEl.appendChild(grid);
          container.appendChild(sectionEl);
        });
      }

      Office.onReady(() => {
        updatePreview(selectedSymbol);
        renderSections();

        document.getElementById("search").addEventListener("input", (event) => {
          renderSections(event.target.value);
        });

        document.getElementById("insert").addEventListener("click", () => {
          Office.context.ui.messageParent(JSON.stringify({
            symbol: selectedSymbol.char,
            label: selectedSymbol.label,
          }));
        });

        document.getElementById("close").addEventListener("click", () => {
          Office.context.ui.messageParent(JSON.stringify(null));
        });
      });
    </script>
  </body>
</html>
