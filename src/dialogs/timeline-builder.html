<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Timeline Builder</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body { font-family: "Segoe UI", sans-serif; margin: 0; padding: 20px; background: #f3f2f1; font-size: 13px; }
      h2 { font-size: 15px; margin: 0 0 12px; color: #201f1e; }
      label { display: block; margin-bottom: 4px; color: #323130; }
      input[type="date"], input[type="text"] {
        width: 100%; padding: 6px 8px; border: 1px solid #c8c6c4;
        border-radius: 4px; font-size: 13px; box-sizing: border-box; margin-bottom: 10px;
      }
      .row { display: flex; gap: 8px; }
      .row > div { flex: 1; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
      th { background: #edebe9; font-weight: 600; padding: 4px 6px; text-align: left; font-size: 12px; }
      td { padding: 3px 4px; }
      td input { width: 100%; padding: 3px 5px; border: 1px solid #c8c6c4; border-radius: 3px; font-size: 12px; box-sizing: border-box; }
      .hint { font-size: 11px; color: #605e5c; margin-bottom: 10px; }
      button {
        width: 100%; padding: 8px; border: none; border-radius: 4px;
        font-size: 13px; font-weight: 600; cursor: pointer;
        background: #0078d4; color: #fff; margin-top: 4px;
      }
      button:hover { background: #106ebe; }
      .secondary { background: #fff; color: #323130; border: 1px solid #c8c6c4; font-weight: 400; }
      .secondary:hover { background: #edebe9; }
      .cancel { background: #fff; color: #323130; border: 1px solid #c8c6c4; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h2>Timeline Builder</h2>

    <div class="row">
      <div>
        <label for="start-date">Start Date</label>
        <input type="date" id="start-date" />
      </div>
      <div>
        <label for="end-date">End Date</label>
        <input type="date" id="end-date" />
      </div>
    </div>

    <p class="hint">Add milestones below with a label and date.</p>

    <table>
      <thead>
        <tr><th>Label</th><th>Date</th></tr>
      </thead>
      <tbody id="milestones-body">
        <tr>
          <td><input type="text" class="ms-label" placeholder="Milestone 1" /></td>
          <td><input type="date" class="ms-date" /></td>
        </tr>
        <tr>
          <td><input type="text" class="ms-label" placeholder="Milestone 2" /></td>
          <td><input type="date" class="ms-date" /></td>
        </tr>
      </tbody>
    </table>

    <button class="secondary" id="add-row">+ Add Milestone</button>
    <button id="submit">Build Timeline</button>
    <button class="cancel" id="cancel">Cancel</button>

    <script>
      Office.onReady(() => {
        document.getElementById("add-row").addEventListener("click", () => {
          const tbody = document.getElementById("milestones-body");
          const n = tbody.rows.length + 1;
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><input type="text" class="ms-label" placeholder="Milestone ${n}" /></td>
            <td><input type="date" class="ms-date" /></td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("submit").addEventListener("click", () => {
          const startDate = document.getElementById("start-date").value;
          const endDate = document.getElementById("end-date").value;

          const labels = Array.from(document.querySelectorAll(".ms-label")).map((el) => el.value.trim());
          const dates = Array.from(document.querySelectorAll(".ms-date")).map((el) => el.value);

          const milestones = labels
            .map((label, i) => ({ label, date: dates[i] }))
            .filter((m) => m.label && m.date);

          Office.context.ui.messageParent(JSON.stringify({ milestones, startDate, endDate }));
        });

        document.getElementById("cancel").addEventListener("click", () => {
          Office.context.ui.messageParent(JSON.stringify(null));
        });
      });
    </script>
  </body>
</html>
