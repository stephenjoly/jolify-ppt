<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Save Selected Deck</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        background: #f3f2f1;
        color: #201f1e;
        box-sizing: border-box;
      }

      .dialog-shell {
        display: flex;
        flex-direction: column;
        gap: 14px;
        max-width: 460px;
        margin: 0 auto;
      }

      h1 {
        font-size: 18px;
        line-height: 1.3;
        margin: 0;
        color: #201f1e;
      }

      .intro {
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
        color: #323130;
      }

      .status {
        background: #ffffff;
        border: 1px solid #e1dfdd;
        border-left: 4px solid #0078d4;
        border-radius: 6px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .status strong {
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .status span {
        font-size: 13px;
        line-height: 1.4;
      }

      .status.success {
        border-left-color: #107c10;
      }

      .status.warning {
        border-left-color: #d83b01;
      }

      .status.error {
        border-left-color: #a4262c;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 9px 12px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        background: #0078d4;
        color: #fff;
      }

      button.primary:hover:not(:disabled) {
        background: #106ebe;
      }

      button.secondary {
        background: #fff;
        color: #323130;
        border: 1px solid #c8c6c4;
      }

      button.secondary:hover:not(:disabled) {
        background: #edebe9;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body class="selected-deck-dialog">
    <main class="dialog-shell">
      <h1>Save Selected Deck</h1>
      <p class="intro">
        Create a new presentation from the slides currently selected in PowerPoint.
      </p>

      <div id="status" class="status info">
        <strong>Ready</strong>
        <span>Click Create Deck to export the selected slides.</span>
      </div>

      <div class="actions">
        <button id="run" type="button" class="primary">Create Deck</button>
        <button id="close" type="button" class="secondary">Close</button>
      </div>
    </main>
  </body>
</html>
