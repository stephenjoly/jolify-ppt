<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Slide Builder from Outline</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body { font-family: "Segoe UI", sans-serif; margin: 0; padding: 20px; background: #f3f2f1; }
      h2 { font-size: 15px; margin: 0 0 8px; color: #201f1e; }
      .hint { font-size: 11px; color: #605e5c; margin: 0 0 12px; }
      label { display: block; font-size: 13px; margin-bottom: 4px; color: #323130; }
      textarea {
        width: 100%; height: 160px; padding: 8px; border: 1px solid #c8c6c4;
        border-radius: 4px; font-size: 12px; font-family: monospace;
        box-sizing: border-box; resize: vertical; margin-bottom: 12px;
      }
      button {
        width: 100%; padding: 8px; border: none; border-radius: 4px;
        font-size: 13px; font-weight: 600; cursor: pointer;
        background: #0078d4; color: #fff; margin-top: 4px;
      }
      button:hover { background: #106ebe; }
      .cancel { background: #fff; color: #323130; border: 1px solid #c8c6c4; margin-top: 8px; }
      .cancel:hover { background: #edebe9; }
    </style>
  </head>
  <body>
    <h2>Slide Builder from Outline</h2>
    <p class="hint">
      Each unindented line or <code># Heading</code> becomes a new slide title.<br>
      Indented lines or <code>- bullet</code> lines become bullet text.
    </p>

    <label for="outline">Paste your outline</label>
    <textarea id="outline" placeholder="# Slide Title&#10;  - Bullet point&#10;  - Another point&#10;# Next Slide"></textarea>

    <button id="submit">Build Slides</button>
    <button class="cancel" id="cancel">Cancel</button>

    <script>
      Office.onReady(() => {
        document.getElementById("submit").addEventListener("click", () => {
          const outline = document.getElementById("outline").value;
          Office.context.ui.messageParent(JSON.stringify({ outline }));
        });

        document.getElementById("cancel").addEventListener("click", () => {
          Office.context.ui.messageParent(JSON.stringify(null));
        });
      });
    </script>
  </body>
</html>
