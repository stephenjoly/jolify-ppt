<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Batch Rename Shapes</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body { font-family: "Segoe UI", sans-serif; margin: 0; padding: 20px; background: #f3f2f1; }
      h2 { font-size: 15px; margin: 0 0 16px; color: #201f1e; }
      label { display: block; font-size: 13px; margin-bottom: 4px; color: #323130; }
      input[type="text"] {
        width: 100%; padding: 6px 8px; border: 1px solid #c8c6c4;
        border-radius: 4px; font-size: 13px; box-sizing: border-box; margin-bottom: 8px;
      }
      .hint { font-size: 11px; color: #605e5c; margin-bottom: 16px; }
      button {
        width: 100%; padding: 8px; border: none; border-radius: 4px;
        font-size: 13px; font-weight: 600; cursor: pointer;
        background: #0078d4; color: #fff; margin-top: 4px;
      }
      button:hover { background: #106ebe; }
      .cancel { background: #fff; color: #323130; border: 1px solid #c8c6c4; margin-top: 8px; }
      .cancel:hover { background: #edebe9; }
    </style>
  </head>
  <body>
    <h2>Batch Rename Shapes</h2>

    <label for="template">Naming template</label>
    <input type="text" id="template" value="Shape {n}" placeholder="e.g. Shape {n}" />
    <p class="hint">Use <code>{n}</code> for 1-based index, <code>{i}</code> for 0-based index.</p>

    <button id="submit">Rename</button>
    <button class="cancel" id="cancel">Cancel</button>

    <script>
      Office.onReady(() => {
        document.getElementById("submit").addEventListener("click", () => {
          const template = document.getElementById("template").value || "Shape {n}";
          Office.context.ui.messageParent(JSON.stringify({ template }));
        });

        document.getElementById("cancel").addEventListener("click", () => {
          Office.context.ui.messageParent(JSON.stringify(null));
        });
      });
    </script>
  </body>
</html>
